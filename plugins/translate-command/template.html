<div class="trc-wrap">
  <div class="trc-header">
    <svg width="28" height="28" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="10" cy="10" r="10" fill="rgba(255,255,255,0.12)"/>
      <text x="10" y="12.5" font-size="9" font-weight="900" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">文</text>
    </svg>
    <span class="trc-title">Translate</span>
  </div>

  <div class="trc-card">
    <div class="trc-card-top">
      <div class="trc-dd" id="trc-from-dd" data-value="{{from_code}}">
        <svg class="trc-dd-arrow" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="trc-dd-label">{{from_name}}</span>
        <div class="trc-dd-menu" id="trc-from-menu"></div>
      </div>
    </div>
    <div class="trc-card-body">
      <textarea class="trc-textarea" id="trc-source" placeholder="Type text here...">{{source_text}}</textarea>
    </div>
    <div class="trc-card-footer">
      <button class="trc-foot-btn" id="trc-clear">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="1" y1="1" x2="10" y2="10"/><line x1="10" y1="1" x2="1" y2="10"/></svg>
        Clear
      </button>
      <button class="trc-foot-btn" id="trc-copy-src">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="6" height="6" rx="1.2"/><path d="M8 4V3A1.2 1.2 0 0 0 6.8 2H3A1.2 1.2 0 0 0 2 3.2V7A1.2 1.2 0 0 0 3 8h1"/></svg>
        Copy
      </button>
    </div>
  </div>

  <div class="trc-action">
    <button class="trc-btn" id="trc-translate-btn">
      <svg class="trc-btn-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M6 1v10M1 6l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Translate
    </button>
  </div>

  <div class="trc-card">
    <div class="trc-card-top">
      <div class="trc-dd" id="trc-to-dd" data-value="{{to_code}}">
        <svg class="trc-dd-arrow" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="trc-dd-label">{{to_name}}</span>
        <div class="trc-dd-menu" id="trc-to-menu"></div>
      </div>
    </div>
    <div class="trc-card-body">
      <textarea class="trc-textarea trc-result" id="trc-result" placeholder="Translation...">{{translated_text}}</textarea>
    </div>
    <div class="trc-card-footer">
      <button class="trc-foot-btn" id="trc-use-source">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6h10M6 1l5 5-5 5"/></svg>
        Use as source
      </button>
      <button class="trc-foot-btn" id="trc-copy-res">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="6" height="6" rx="1.2"/><path d="M8 4V3A1.2 1.2 0 0 0 6.8 2H3A1.2 1.2 0 0 0 2 3.2V7A1.2 1.2 0 0 0 3 8h1"/></svg>
        Copy
      </button>
    </div>
  </div>

  <script>
  (function(){
    const LANGS = {{langs_json}};
    // from-dd includes Auto-detect, to-dd does not
    var ddConfigs = [
      { id: "trc-from-dd", menuId: "trc-from-menu", includeAuto: true },
      { id: "trc-to-dd",   menuId: "trc-to-menu",  includeAuto: false },
    ];
    ddConfigs.forEach(function(cfg){
      var dd = document.getElementById(cfg.id);
      var menu = document.getElementById(cfg.menuId);
      var label = dd.querySelector(".trc-dd-label");

      // Add Auto-detect option only for from-dd
      if(cfg.includeAuto){
        var autoItem = document.createElement("div");
        autoItem.className = "trc-dd-item" + (dd.dataset.value === "autodetect" ? " trc-dd-item-active" : "");
        autoItem.textContent = "Auto-detect";
        autoItem.dataset.value = "autodetect";
        autoItem.addEventListener("click", function(e){
          e.stopPropagation();
          dd.dataset.value = "autodetect";
          label.textContent = "Auto-detect";
          menu.querySelectorAll(".trc-dd-item").forEach(function(i){ i.classList.remove("trc-dd-item-active"); });
          autoItem.classList.add("trc-dd-item-active");
          dd.classList.remove("trc-dd-open");
        });
        menu.appendChild(autoItem);
      }

      Object.entries(LANGS).forEach(function([code, name]){
        var item = document.createElement("div");
        item.className = "trc-dd-item" + (dd.dataset.value === code ? " trc-dd-item-active" : "");
        item.textContent = name;
        item.dataset.value = code;
        item.addEventListener("click", function(e){
          e.stopPropagation();
          dd.dataset.value = code;
          label.textContent = name;
          menu.querySelectorAll(".trc-dd-item").forEach(function(i){ i.classList.remove("trc-dd-item-active"); });
          item.classList.add("trc-dd-item-active");
          dd.classList.remove("trc-dd-open");
        });
        menu.appendChild(item);
      });

      dd.addEventListener("click", function(e){
        e.stopPropagation();
        var isOpen = dd.classList.contains("trc-dd-open");
        document.querySelectorAll(".trc-dd-open").forEach(function(el){ el.classList.remove("trc-dd-open"); });
        if(!isOpen){
          dd.classList.add("trc-dd-open");
          var rect = dd.getBoundingClientRect();
          var menuH = 228;
          var spaceBelow = window.innerHeight - rect.bottom;
          if(spaceBelow < menuH){
            menu.style.top = (rect.top - menuH - 4) + "px";
          } else {
            menu.style.top = (rect.bottom + 4) + "px";
          }
          menu.style.left = rect.left + "px";
        }
      });
    });
    document.addEventListener("click", function(){ document.querySelectorAll(".trc-dd-open").forEach(function(el){ el.classList.remove("trc-dd-open"); }); });
  })();
  </script>
</div>
