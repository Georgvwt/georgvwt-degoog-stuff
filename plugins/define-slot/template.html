<div class="dslot-wrap">

  <div class="dslot-header">
            <svg class="dslot-icon" width="28" height="28" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="10" cy="10" r="10" fill="rgba(255,255,255,0.12)"/>
      <path d="M10 6.5C8.5 5.5 6 5.5 4.5 6v8c1.5-.5 4-.5 5.5.5" stroke="rgba(255,255,255,0.85)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 6.5c1.5-1 4-1 5.5-.5v8c-1.5-.5-4-.5-5.5.5" stroke="rgba(255,255,255,0.85)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="10" y1="6.5" x2="10" y2="15" stroke="rgba(255,255,255,0.85)" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="dslot-header-label">Dictionary</span>
  </div>

  <div class="dslot-word-row">
    <span class="dslot-word">{{word}}</span>
    <span class="dslot-phonetic">{{phonetic}}</span>
    {{audio_btn}}
  </div>

  <div class="dslot-divider"></div>

  <div class="dslot-section">
    <div class="dslot-section-label">Definitions</div>
    <div class="dslot-defs">{{definitions}}</div>
  </div>

  <div class="dslot-grid">
    <div class="dslot-tags-box">
      <div class="dslot-section-label">Synonyms</div>
      <div class="dslot-tags">{{synonyms}}</div>
    </div>
    <div class="dslot-tags-box">
      <div class="dslot-section-label">Antonyms</div>
      <div class="dslot-tags">{{antonyms}}</div>
    </div>
  </div>

  {{etymology}}

</div>
